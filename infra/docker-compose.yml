name: secmess

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${VOLUMES_ROOT:-./volumes}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  synapse:
    image: matrixdotorg/synapse:latest
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: ${MATRIX_SERVER_NAME}
      SYNAPSE_REPORT_STATS: "no"
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ${VOLUMES_ROOT:-./volumes}/synapse:/data
    expose:
      - "8008"
    networks:
      - internal

  keygen:
    build:
      context: ../keygen
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    environment:
      KEYGEN_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      KEYGEN_MASTER_KEY: ${KEYGEN_MASTER_KEY}
      KEYGEN_TOKEN_HASH_SECRET: ${KEYGEN_TOKEN_HASH_SECRET:-${KEYGEN_MASTER_KEY}}
      KEYGEN_MASTER_KEY_HEADER: ${KEYGEN_MASTER_KEY_HEADER:-X-Master-Key}
      KEYGEN_SYNAPSE_ADMIN_BASE_URL: http://synapse:8008
      KEYGEN_SYNAPSE_REGISTRATION_SHARED_SECRET: ${SYNAPSE_REGISTRATION_SHARED_SECRET}
      KEYGEN_DEFAULT_TTL_SECONDS: ${KEYGEN_DEFAULT_TTL_SECONDS:-900}
      KEYGEN_TOKEN_TTL_SECONDS: ${KEYGEN_TOKEN_TTL_SECONDS:-900}
      KEYGEN_CREATE_MIN_RESPONSE_SECONDS: ${KEYGEN_CREATE_MIN_RESPONSE_SECONDS:-3}
      KEYGEN_MAX_TTL_SECONDS: ${KEYGEN_MAX_TTL_SECONDS:-86400}
      KEYGEN_EXPOSE_DOCS: ${KEYGEN_EXPOSE_DOCS:-false}
      KEYGEN_USER_PREFIX: ${KEYGEN_USER_PREFIX:-user}
      KEYGEN_QR_PAYLOAD_PREFIX: ${KEYGEN_QR_PAYLOAD_PREFIX:-secmess://invite?token=}
      KEYGEN_MATRIX_SERVER_NAME: ${KEYGEN_MATRIX_SERVER_NAME:-secmess.cloudpub.ru}
      KEYGEN_DEFAULT_ADMIN_USER_ID: ${KEYGEN_DEFAULT_ADMIN_USER_ID:-@admin:secmess.cloudpub.ru}
      KEYGEN_ROLE_SUPER_ADMINS: ${KEYGEN_ROLE_SUPER_ADMINS:-}
      KEYGEN_ROLE_ADMINS: ${KEYGEN_ROLE_ADMINS:-@admin:secmess.cloudpub.ru}
      KEYGEN_ROLE_DEVELOPERS: ${KEYGEN_ROLE_DEVELOPERS:-}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - synapse
      - keygen
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${VOLUMES_ROOT:-./volumes}/certs:/etc/nginx/certs:ro
    networks:
      - edge
      - internal

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true
